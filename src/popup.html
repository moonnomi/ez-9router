<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ez-9router</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>ez-9router</h1>
          <p>Local context prompts</p>
        </div>
        <button id="refreshModels" class="icon-btn" title="Refresh models">Refresh</button>
      </header>

      <label>
        <span>9router URL</span>
        <input id="endpoint" spellcheck="false">
      </label>

      <label>
        <span>API key</span>
        <input id="apiKey" type="password" spellcheck="false">
      </label>

      <label>
        <span>Model</span>
        <select id="model"></select>
      </label>

      <button id="testModel" class="wide-btn">Test selected model</button>

      <section>
        <div class="section-title">Theme</div>
        <div class="segmented" id="theme">
          <button data-theme="system">System</button>
          <button data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </section>

      <section>
        <div class="section-row">
          <div>
            <div class="section-title">Conversation</div>
            <p id="activeOrigin">Current site</p>
          </div>
          <label class="switch">
            <input id="resumeConversations" type="checkbox">
            <span></span>
          </label>
        </div>
        <div id="conversationList" class="conversation-list"></div>
      </section>

      <section>
        <div class="section-row">
          <div>
            <div class="section-title">Debug logs</div>
            <p>Sanitized request/error traces</p>
          </div>
          <label class="switch">
            <input id="debugEnabled" type="checkbox">
            <span></span>
          </label>
        </div>
        <div class="debug-actions">
          <button id="copyLogs" class="small-btn">Copy</button>
          <button id="clearLogs" class="small-btn">Clear</button>
        </div>
        <div id="debugList" class="debug-list"></div>
      </section>

      <section>
        <div class="section-row">
          <div class="section-title">Context prompts</div>
          <button id="addPrompt" class="small-btn">Add</button>
        </div>
        <div id="promptList" class="prompt-list"></div>
      </section>

      <p id="status" role="status"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
